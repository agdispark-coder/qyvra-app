  <title>QYVRA - Women's Wellness</title>
  <style>
    body { background: #FAF7F4; margin: 0; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'DM Sans', sans-serif; }
    .logo { width: 80px; height: 80px; background: rgba(196,96,122,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
    .logo span { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700; color: #C4607A; }

    p { color: #9B9B9B; margin: 0; font-size: 14px; }
    .spinner { margin-top: 20px; width: 32px; height: 32px; border: 3px solid rgba(196,96,122,0.15); border-top-color: #C4607A; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="logo"><span>Q</span></div>
